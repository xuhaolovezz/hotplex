# HotPlex Worker Gateway - Production Configuration
#
# Inherits: config.yaml (base)
# Usage: ./hotplex -config configs/config-prod.yaml
#
# Required env vars:
#   HOTPLEX_ADMIN_TOKEN_1    — Admin API token
#
# Only fields that differ from base are listed below.

inherits: config.yaml

gateway:
  idle_timeout: 10m

security:
  tls_enabled: true
  allowed_origins:
    - "https://app.yourdomain.com"
    - "https://admin.yourdomain.com"

pool:
  min_size: 10
  max_size: 500
  max_memory_per_user: 3221225472  # 3GB

worker:
  idle_timeout: 30m

messaging:
  feishu:
    dm_policy: "open"
    group_policy: "open"
