# HotPlex Worker Gateway - Development Configuration
#
# Inherits: config.yaml (base)
# Usage: ./hotplex -config configs/config-dev.yaml
#
# Only fields that differ from base are listed below.

inherits: config.yaml

admin:
  addr: "127.0.0.1:9999"
  tokens:
    - "${ADMIN_TOKEN}"
  rate_limit_enabled: false

gateway:
  addr: "127.0.0.1:8888"

webchat:
  addr: "127.0.0.1:3000"
  enabled: false # dev mode uses next dev server for hot reload

session:
  retention_period: 24h
  max_concurrent: 100

pool:
  max_size: 50
  max_memory_per_user: 3221225472  # 3GB

worker:
  idle_timeout: 30m
  execution_timeout: 30m
  opencode_server:
    password: "${OPENCODE_SERVER_PASSWORD}"

log:
  level: "debug"
  format: "text"

messaging:
  turn_summary_enabled: true
  slack:
    enabled: true
  feishu:
    enabled: true
    worker_type: "opencode_server"
